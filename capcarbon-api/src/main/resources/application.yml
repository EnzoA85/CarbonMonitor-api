spring:
  application:
    name: capcarbon-api

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/capcarbon
    username: capcarbon
    password: capcarbon
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ─── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

# ─── Serveur ───────────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api

# ─── JWT ───────────────────────────────────────────────────────────────────
jwt:
  secret: N0EzNDgyNzA1RTNENTJBMDhEQzMxN0IxMkMyMEVFNEQ2NzM3NUFBQjQwM0I1RkI2RDUwQTJFMkY5QzQzOTA1RA==
  expiration-ms: 86400000  # 24 heures

# ─── SpringDoc / Swagger UI ────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  info:
    title: CapCarbon API
    description: API REST de calcul d'empreinte carbone pour infrastructures physiques — Hackathon Capgemini
    version: 1.0.0
    contact:
      name: Équipe CapCarbon
      email: capcarbon@capgemini.com

# ─── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    com.capgemini.capcarbon: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
